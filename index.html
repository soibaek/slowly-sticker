<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>慢慢贴</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📝</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FFF9C4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="慢慢贴" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ========== 主题变量（可换肤） ========== */
    :root {
      --ink: #5D4037;
      --ink-soft: #c8b97a;
      --shadow: #C8B97A;
      --note-bg: #FFF9C4;
      --panel: var(--panel);
      --panel-alt: var(--panel-alt);
    }

    /* ========== 全局 ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #D9D2B0;
      background-image:
        linear-gradient(rgba(120,104,60,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,104,60,0.18) 1px, transparent 1px);
      background-size: 24px 24px;
      image-rendering: pixelated;
      font-family: 'Press Start 2P', monospace;
      overflow: auto;
      position: relative;
    }

    /* ========== 便利贴主体 ========== */
    #sticky {
      position: absolute;
      width: 420px;
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      box-shadow: 6px 6px 0 var(--shadow);
      padding: 0;
      user-select: none;
      transition: opacity 0.1s;
      image-rendering: pixelated;
      --corner-size: 26px;
      clip-path: polygon(
        0 0,
        calc(100% - var(--corner-size)) 0,
        100% var(--corner-size),
        100% 100%,
        0 100%
      );
    }
    #sticky::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: var(--corner-size, 26px);
      height: var(--corner-size, 26px);
      background: #FFF9C4;
      border-left: 3px solid var(--ink);
      border-bottom: 3px solid var(--ink);
      clip-path: polygon(0 0, 100% 100%, 100% 0);
      z-index: 3;
    }
    #sticky.dragging { opacity: 0.85; }

    /* 内容内边距容器 */
    #sticky-body { padding: 14px 16px 16px; }

    /* ========== 头部（深褐色条） ========== */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--ink);
      padding: 12px 14px;
      cursor: move;
    }
    #header h1 {
      font-size: 13px;
      color: #FFF9C4;
      letter-spacing: 3px;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 4px;
      border-radius: 0;
      transition: transform 0.1s;
      filter: saturate(1.1);
    }
    .icon-btn:active { transform: translateY(2px); }

    /* ========== 彩蛋 / 小动物面板 ========== */
    #pet-panel {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 3px solid var(--ink);
      background: var(--panel);
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 4px 4px 0 var(--shadow);
    }
    /* 左侧像素动物方框 64x64 */
    #pet-box {
      width: 72px;
      flex-shrink: 0;
      text-align: center;
      position: relative;
    }
    #pet-display {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      line-height: 1;
      background: transparent;
      cursor: pointer;
      image-rendering: pixelated;
      transition: transform 0.15s;
    }
    #pet-display img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }
    #pet-display:hover { transform: scale(1.08); }
    #pet-display.empty {
      background: transparent;
      border: 3px dashed var(--ink-soft);
      color: var(--ink-soft);
      font-size: 30px;
    }
    #pet-name {
      display: block;
      font-size: 8px;
      color: var(--ink);
    }
    .rename-btn {
      width: 20px;
      height: 20px;
      font-size: 12px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: #F5E6B8;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.08s;
    }
    .rename-btn:hover { background: #FFE082; }
    .rename-btn:active {
      box-shadow: none;
      transform: translate(2px, 2px);
    }
    /* 右侧彩蛋信息 */
    #egg-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      font-size: 8px;
      color: #795548;
    }
    #egg-line { display: flex; align-items: center; gap: 6px; }
    #egg-line .egg-emoji { font-size: 22px; }
    #egg-line .egg-img {
      width: 30px; height: 30px;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }
    #egg-count { font-weight: bold; color: #e65100; font-size: 14px; }
    #egg-hint { font-size: 7px; color: #a98c6a; line-height: 1.7; }

    .pixel-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 7px 10px;
      border: 2px solid var(--ink);
      border-radius: 0;
      cursor: pointer;
      background: #F5E6B8;
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      transition: all 0.08s;
      line-height: 1.4;
    }
    .pixel-btn:active {
      box-shadow: none;
      transform: translate(3px, 3px);
    }
    .pixel-btn.primary { background: #FFE082; }
    .pixel-btn.comfort { background: #F8BBD0; }
    #hatch-btn { background: var(--panel); }

    /* ========== 小动物区域（保留占位，主显示已并入 pet-panel） ========== */
    #pet-zone { display: none; }

    /* ========== 气泡提示 ========== */
    #bubble {
      position: absolute;
      right: 50px;
      top: 80px;
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 8px;
      color: #333;
      max-width: 180px;
      line-height: 1.6;
      box-shadow: 2px 2px 0 var(--ink);
      z-index: 10;
      display: none;
      word-break: break-all;
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      right: 14px;
      border: 4px solid transparent;
      border-top-color: var(--ink);
    }

    /* ========== 改名模态框 ========== */
    #rename-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #rename-modal.show { display: flex; }
    #rename-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 20px 24px;
      box-shadow: 6px 6px 0 var(--ink);
      text-align: center;
      width: 280px;
    }
    #rename-box h3 {
      font-size: 10px;
      color: var(--ink);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }
    #rename-input {
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 8px 10px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: #F5E6B8;
      color: var(--ink);
      outline: none;
      margin-bottom: 14px;
      text-align: center;
    }
    #rename-input:focus { border-color: #F6A623; }
    #rename-box .btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* ========== 小动物菜单 ========== */
    #pet-menu {
      position: absolute;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 6px;
      display: none;
      flex-direction: column;
      gap: 4px;
      box-shadow: 4px 4px 0 var(--ink);
      z-index: 50;
    }
    #pet-menu.show { display: flex; }
    #pet-menu button {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 16px;
      border: 2px solid var(--ink);
      border-radius: 0;
      cursor: pointer;
      background: #F5E6B8;
      color: var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      transition: all 0.08s;
      text-align: left;
    }
    #pet-menu button:hover { background: #FFE082; }
    #pet-menu button:active {
      box-shadow: none;
      transform: translate(2px, 2px);
    }
    #pet-menu button.comfort-btn { background: #F8BBD0; }

    /* ========== AI 聊天面板 ========== */
    #chat-panel {
      position: absolute;
      top: 120px;
      right: -320px;
      width: 300px;
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      box-shadow: 6px 6px 0 var(--shadow);
      display: none;
      flex-direction: column;
      z-index: 100;
      image-rendering: pixelated;
    }
    #chat-panel.show { display: flex; }
    #chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--ink);
      color: #FFF9C4;
      padding: 8px 10px;
      font-size: 9px;
    }
    #chat-header .pet-emoji { font-size: 14px; }
    #chat-close {
      background: none;
      border: none;
      color: #FFF9C4;
      font-size: 14px;
      cursor: pointer;
      padding: 2px;
    }
    #chat-messages {
      flex: 1;
      height: 240px;
      overflow-y: auto;
      padding: 10px;
      background: var(--panel);
    }
    #chat-messages::-webkit-scrollbar { width: 6px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 0; }
    .chat-message {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
    }
    .chat-message.user { flex-direction: row-reverse; }
    .chat-message.user .chat-bubble {
      background: #E3F2FD;
      border-color: #5D4037;
      align-self: flex-end;
    }
    .chat-message.assistant { flex-direction: row; }
    .chat-message.assistant .chat-bubble {
      background: #F5E6B8;
      border-color: #5D4037;
      align-self: flex-start;
    }
    .chat-avatar {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .chat-bubble {
      max-width: 75%;
      padding: 8px 10px;
      border: 2px solid var(--ink);
      border-radius: 0;
      font-size: 8px;
      line-height: 1.6;
      word-break: break-all;
    }
    .chat-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 10px;
      font-size: 8px;
      color: #795548;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      background: #795548;
      border-radius: 0;
      animation: typing 1.4s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    #chat-input-area {
      display: flex;
      gap: 6px;
      padding: 10px;
      border-top: 2px solid var(--ink);
    }
    #chat-input {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 6px 8px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: #fff;
      color: #4e342e;
      outline: none;
    }
    #chat-send {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 6px 10px;
      border: 2px solid var(--ink);
      border-radius: 0;
      cursor: pointer;
      background: #FFE082;
      color: var(--ink);
      box-shadow: 2px 2px 0 var(--ink);
      transition: all 0.08s;
    }
    #chat-send:active {
      box-shadow: none;
      transform: translate(2px, 2px);
    }
    #chat-error {
      padding: 8px 10px;
      background: #ffebee;
      border-top: 2px solid #c62828;
      font-size: 7px;
      color: #c62828;
      display: none;
    }
    #chat-error.show { display: block; }
    #chat-footer {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      background: #FFF9C4;
      border-top: 1px dashed var(--ink-soft);
    }
    #chat-footer .pixel-btn {
      font-size: 7px;
      padding: 3px 6px;
      background: #E8F5E9;
      border: 1px solid var(--ink);
      cursor: pointer;
    }
    #chat-footer .pixel-btn:hover {
      background: #C8E6C9;
    }

    /* ========== 孵化动画 ========== */
    #hatch-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #hatch-overlay.show { display: flex; }
    #hatch-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 24px 32px;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      animation: hatchIn 0.4s ease;
    }
    @keyframes hatchIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #hatch-anim { font-size: 52px; display: block; margin-bottom: 12px; animation: hatchPop 0.6s ease 0.3s both; }
    #hatch-anim img {
      width: 96px; height: 96px;
      object-fit: contain;
      image-rendering: pixelated;
      display: inline-block;
    }
    @keyframes hatchPop {
      0%   { transform: scale(0.4); }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* ========== 任务清单标题条 ========== */
    #task-head {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--ink);
      color: #FFF9C4;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 6px 8px;
      border: 3px solid var(--ink);
      border-bottom: none;
    }
    #task-head .sq { width: 8px; height: 8px; background: #FFF9C4; display: inline-block; }

    /* ========== 任务列表 ========== */
    #task-list {
      list-style: none;
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 12px;
      border: 3px solid var(--ink);
      background: var(--panel);
      box-shadow: 4px 4px 0 var(--shadow);
    }
    #task-list::-webkit-scrollbar { width: 6px; }
    #task-list::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 0; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 2px dashed #E0D68A;
      font-size: 9px;
      color: #4e342e;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:nth-child(even) { background: var(--panel-alt); }
    .task-item input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: var(--panel);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }
    .task-item input[type="checkbox"]:checked {
      background: #F6A623;
    }
    .task-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 0px;
      width: 5px; height: 9px;
      border: solid var(--ink);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .task-item .task-text {
      flex: 1;
      word-break: break-all;
      line-height: 1.6;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: #bcaaa4;
    }
    .task-item .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #8d6e63;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.1s;
    }
    .task-item .del-btn:hover { opacity: 1; }

    /* ========== 添加任务 ========== */
    #add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    #new-task-input {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 9px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: var(--panel);
      color: #4e342e;
      outline: none;
      box-shadow: 3px 3px 0 var(--shadow);
    }
    #new-task-input:focus { border-color: #F6A623; }

    /* ========== 底部按钮行 ========== */
    #bottom-bar {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 12px;
    }
    #bottom-bar .pixel-btn { flex: 1; }
    #open-encourage {
      flex: 0 0 auto;
      width: 44px;
      padding: 7px 0;
      font-size: 14px;
      text-align: center;
    }

    /* ========== 分隔虚线 ========== */
    #divider {
      border: none;
      border-top: 2px dashed var(--ink-soft);
      margin: 4px 0 10px;
    }

    /* ========== 打开桌宠助手（整行大按钮） ========== */
    #open-pet-helper {
      display: block;
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 12px;
      border: 3px solid var(--ink);
      border-radius: 0;
      background: #F5E6B8;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--shadow);
      transition: all 0.08s;
    }
    #open-pet-helper:active {
      box-shadow: none;
      transform: translate(4px, 4px);
    }

    /* ========== 底部小字 ========== */
    #footer {
      font-size: 7px;
      color: #a1887f;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    /* ========== 收集册弹窗 ========== */
    #collection-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #collection-modal.show { display: flex; }
    #collection-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 20px;
      width: min(320px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
    }
    #collection-box h2 { font-size: 10px; margin-bottom: 12px; }
    .coll-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px dashed var(--ink-soft);
      font-size: 8px;
    }
    .coll-emoji { font-size: 22px; }
    .coll-info { line-height: 1.8; }
    #close-coll {
      float: right;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
    }

    /* ========== 颜色选择器 ========== */
    #color-picker-popup {
      position: absolute;
      top: 36px;
      right: 8px;
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 8px;
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      width: 110px;
      box-shadow: 3px 3px 0 var(--ink);
      z-index: 20;
    }
    #color-picker-popup.show { display: flex; }
    .color-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-dot:hover { transform: scale(1.2); }
    .color-dot.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--ink); }

    /* ========== 收集册网格 ========== */
    #coll-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .coll-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--panel);
      border: 2px solid var(--ink-soft);
      border-radius: 6px;
      padding: 6px 4px;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
      font-size: 7px;
      color: var(--ink);
      text-align: center;
      gap: 2px;
    }
    .coll-cell:hover { transform: scale(1.05); }
    .coll-cell.current { border-color: #f9a825; background: #fff9c4; box-shadow: 0 0 0 2px #f9a825; }
    .coll-cell .cell-emoji { font-size: 20px; }
    .coll-cell .cell-img {
      width: 32px; height: 32px;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }
    .coll-cell .cell-count { color: #a1887f; font-size: 6px; }

<script>
// ============================================================
//  常量与数据
// ============================================================
const ANIMALS = [
  { emoji: '🐱', name: '小咪',   img: 'assets/pets/cat.png',     type: 'cat' },
  { emoji: '🐶', name: '小汪',   img: 'assets/pets/dog.png',     type: 'dog' },
  { emoji: '🐰', name: '小兔兔', img: 'assets/pets/rabbit.png',  type: 'rabbit' },
  { emoji: '🐍', name: '小蛇蛇', img: 'assets/pets/snake.png',   type: 'snake' },
  { emoji: '🦊', name: '小狐',   img: 'assets/pets/fox.png',     type: 'fox' },
  { emoji: '🐻', name: '小熊熊', img: 'assets/pets/bear.png',    type: 'bear' },
  { emoji: '🦝', name: '小浣熊', img: 'assets/pets/redpanda.png', type: 'raccoon' },
];

const EGG_IMG = {
  plain:   'assets/eggs/egg_plain.png',
  rainbow: 'assets/eggs/egg_rainbow.png',
  heart:   'assets/eggs/egg_heart.png',
  blue:    'assets/eggs/egg_blue.png',
  green:   'assets/eggs/egg_green.png',
};
const CRACKED_EGGS = [EGG_IMG.blue, EGG_IMG.green];

function resolvePetImg(item) {
  const hit = ANIMALS.find(a => a.emoji === item.emoji || a.name === item.name);
  return hit ? hit.img : null;
}

const ENCOURAGE = [
  '你从"不想做"到"做了"，这中间的努力只有你自己知道。',
  '完成一件事，不管多小，都是真实发生的进展。',
  '你做到了。不需要再证明什么了。',
  '每一步都算数，包括刚才那一步。',
  '你没有落后。你一直在以自己的节奏前进。',
  '这件事现在已经完成了，它不会再来打扰你了。',
  '你比昨天的自己多做了一件事。',
];

const COMFORT = [
  '你没有失败，你只是在为"能做到"的那天积蓄能量。',
  '今天不想动是正常的，大脑也需要充电。',
  '休息不是偷懒，是为了之后能继续走。',
  '什么都没做也没关系，你今天还是存在着，这件事本身就有价值。',
  '不用和任何人比节奏，你的节奏就是对的节奏。',
  '任务可以等，但你现在的感受更重要。',
];

const PET_TALK = [
  (n) => `${n} 待在你旁边，没有别的意思，就是陪着你。`,
  (n) => `${n} 说：今天不想做也没关系，我们可以一起发呆。`,
  (n) => `${n} 轻轻靠了过来，什么也没说。`,
  (n) => `${n} 提醒你：你已经很久没有喝水了，要不要去喝一口。`,
  (n) => `${n} 说：不用着急，我不会走的。`,
];

// ============================================================
//  localStorage 工具
// ============================================================
const LS = {
  get(k, def) {
    try { return JSON.parse(localStorage.getItem(k)) ?? def; }
    catch { return def; }
  },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};

// ============================================================
//  AI 对话配置
// ============================================================
const AI_CONFIG = {
  apiKey: '4106f7636b41474993e11c076149145d.pbomVyWJBgiYRS0q',
  apiUrl: 'https://open.bigmodel.cn/api/paas/v4/chat/completions',
  model: 'glm-4',
  maxHistory: 10,
  temperature: 0.8,
};

// ============================================================
//  动物类型映射表
// ============================================================
const animalTypeMap = {
  cat: '小猫',
  dog: '小狗',
  bear: '小熊',
  rabbit: '小兔',
  fox: '小狐狸',
  hamster: '小仓鼠',
  snake: '小蛇',
  raccoon: '小浣熊',
};

// ============================================================
//  性格映射表
// ============================================================
const personalityMap = {
  cat: '你是一只温柔的小猫，有时有点小傲娇，说话轻声细语。',
  dog: '你是一只活泼的小狗，总是充满热情，喜欢用感叹号和肢体语言。',
  bear: '你是一只憨厚的小熊，说话慢悠悠的，很温暖，有时候有点迷糊。',
  rabbit: '你是一只害羞的小兔，容易脸红，说话声音很小，总是用"那个……"开头。',
  fox: '你是一只聪明的小狐狸，有点小机灵，喜欢开玩笑但不过分。',
  hamster: '你是一只圆滚滚的小仓鼠，说话快快的，总惦记着瓜子。',
  snake: '你是一只安静的小蛇，说话慢条斯理，有时候会给建议。',
  raccoon: '你是一只呆萌的小浣熊，软软的，说话有点慢，喜欢陪在用户身边。',
};

// ============================================================
//  自定义名字存储
// ============================================================
function getPetNames() {
  return LS.get('petNames', {});
}

function savePetNames(petNames) {
  LS.set('petNames', petNames);
}

function getPetName(animalType) {
  const petNames = getPetNames();
  if (petNames[animalType]) {
    return petNames[animalType];
  }
  return animalTypeMap[animalType] || '小动物';
}

function setPetName(animalType, name) {
  const petNames = getPetNames();
  petNames[animalType] = name;
  savePetNames(petNames);
}

// ============================================================
//  状态
// ============================================================
let tasks     = LS.get('sl_tasks', []);
let eggs      = LS.get('sl_eggs', 0);
let currentPet = LS.get('sl_pet', null);
let collection = LS.get('sl_collection', []);
let totalEggs  = LS.get('sl_total_eggs', 0);
let stickyColor = LS.get('sl_color', '#FFF9C4');
let taskHistory = LS.get('sl_history', {});
let lastOpenDate = LS.get('sl_last_date', null);
const todayStr = new Date().toLocaleDateString('zh-CN');
let customEncouragements = LS.get('custom_encouragements', []);

// AI 对话状态
let chatMessages = [];
let isChatLoading = false;

// ============================================================
//  petManager：集中管理 currentPet 与 hatchedPets
// ============================================================
(function() {
  const SYNC_KEY = 'sl_pet_sync';   // pet.html 通过此键读取当前宠物

  // ---- 已孵化类型集合（从 collection 推导） ----
  function getHatchedTypes() {
    const set = new Set();
    const col = LS.get('sl_collection', []);
    const emojiMap = {
      '🐱': 'cat', '🐶': 'dog', '🐰': 'rabbit', '🐍': 'snake',
      '🦊': 'fox', '🐻': 'bear', '🦝': 'raccoon', '🐹': 'hamster'
    };
    col.forEach(item => {
      const t = item.type || emojiMap[item.emoji];
      if (t) set.add(t);
    });
    return set;
  }

  // ---- 从 type 查找 ANIMALS 条目 ----
  function findAnimalByType(type) {
    return ANIMALS.find(a => a.type === type);
  }

  // ---- 从任意 pet 对象推断 type（兼容旧数据） ----
  function inferType(pet) {
    if (pet && pet.type) return pet.type;
    const emojiMap = {
      '🐱': 'cat', '🐶': 'dog', '🐰': 'rabbit', '🐍': 'snake',
      '🦊': 'fox', '🐻': 'bear', '🦝': 'raccoon', '🐹': 'hamster'
    };
    if (pet && pet.emoji && emojiMap[pet.emoji]) return emojiMap[pet.emoji];
    return 'cat';
  }

  function getPersonality(type) {
    return personalityMap[type] || '';
  }

  function getDefaultName(type) {
    return animalTypeMap[type] || '小动物';
  }

  window.petManager = {
    // ---- 当前宠物 ----
    get current() {
      return currentPet;
    },

    // ---- 已孵化类型 ----
    get hatchedTypes() {
      return getHatchedTypes();
    },

    // ---- 已孵化动物详情（用于 pet.html 的拾取器） ----
    get hatchedAnimals() {
      const types = getHatchedTypes();
      return [...types].map(t => findAnimalByType(t)).filter(Boolean);
    },

    // ---- 检查某类型是否已孵化 ----
    isHatched: function(type) {
      return getHatchedTypes().has(type);
    },

    // ---- 设置当前宠物（统一入口） ----
    // pet 对象需包含 { emoji, name, img?, type }
    setCurrentPet: function(pet) {
      if (!pet) return;
      // 确保有 type
      if (!pet.type) pet.type = inferType(pet);
      currentPet = pet;
      save();
      // 同步键：供 pet.html 读取
      LS.set(SYNC_KEY, {
        emoji: pet.emoji,
        name: pet.name,
        img: pet.img || null,
        type: pet.type,
        ts: Date.now(),
      });
      renderPet();
      showBubble(`${pet.name} 来陪你了。`, 2500);
    },

    // ---- 添加已孵化动物并设为当前 ----
    addHatchedAndSet: function(pet) {
      if (!pet) return;
      if (!pet.type) pet.type = inferType(pet);
      // 加入 collection
      collection.push({
        emoji: pet.emoji,
        name: pet.name,
        img: pet.img || null,
        type: pet.type,
        date: new Date().toLocaleDateString('zh-CN'),
      });
      // 设为当前
      currentPet = pet;
      save();
      LS.set(SYNC_KEY, {
        emoji: pet.emoji,
        name: pet.name,
        img: pet.img || null,
        type: pet.type,
        ts: Date.now(),
      });
      renderPet();
    },

    // ---- 获取类型中文名 ----
    getTypeName: function(type) {
      return animalTypeMap[type || inferType(currentPet)] || '小动物';
    },

    // ---- 获取自定义名字 ----
    getName: function() {
      return getPetName(inferType(currentPet));
    },

    // ---- 获取性格描述 ----
    getPersonality: function() {
      return getPersonality(inferType(currentPet));
    },

    // ---- 获取默认名 ----
    getDefaultName: function() {
      return getDefaultName(inferType(currentPet));
    },

    // ---- 刷新桌面同步键（外部调用） ----
    broadcast: function() {
      if (!currentPet) return;
      LS.set(SYNC_KEY, {
        emoji: currentPet.emoji,
        name: currentPet.name,
        img: currentPet.img || null,
        type: currentPet.type || inferType(currentPet),
        ts: Date.now(),
      });
    },
  };

  // 兼容旧代码：window.pet 委托给 petManager
  window.pet = {
    get type() { return inferType(currentPet); },
    get defaultName() { return getDefaultName(inferType(currentPet)); },
    getName: function() { return getPetName(inferType(currentPet)); },
    get personality() { return getPersonality(inferType(currentPet)); },
    refresh: function() {},
  };

  // ---- 监听 localStorage 变化（桌宠 pet.html 切换时触发） ----
  window.addEventListener('storage', function(e) {
    if (e.key === SYNC_KEY && e.newValue) {
      try {
        const data = JSON.parse(e.newValue);
        if (!data || !data.type) return;
        // 检查是否已经是当前宠物
        if (currentPet && currentPet.type === data.type &&
            currentPet.emoji === data.emoji && currentPet.name === data.name) return;
        // 检查是否已孵化
        if (!petManager.isHatched(data.type)) return;
        // 更新
        currentPet = currentPet || {};
        currentPet.emoji = data.emoji;
        currentPet.name = data.name;
        currentPet.img = data.img || null;
        currentPet.type = data.type;
        save();
        renderPet();
      } catch (err) { /* ignore parse errors */ }
    }
  });
})();

// 提醒日志工具
function logReminder(type, message, data = null) {
  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}.${now.getMilliseconds().toString().padStart(3,'0')}`;
  const prefix = `%c[提醒] ${timeStr}`;
  const colors = {
    'INFO': 'color: #2196F3',
    'SUCCESS': 'color: #4CAF50',
    'WARNING': 'color: #ff9800',
    'ERROR': 'color: #f44336',
    'TRIGGER': 'color: #9c27b0',
  };
  const color = colors[type] || 'color: #333';
  if (data) {
    console.log(`${prefix} %c${message}`, 'color: #888', color, data);
  } else {
    console.log(`${prefix} %c${message}`, 'color: #888', color);
  }
}

// 提醒正则：匹配 "提醒我X分钟后..." 或 "X分钟后提醒我..."
const REMINDER_PATTERNS = [
  /提醒我(\d+)\s*分钟(?:后)?\s*(.+)?/,
  /(\d+)\s*分钟(?:后)?\s*提醒我\s*(.+)?/,
  /(\d+)分钟后/,
  /^(\d+)\s*分钟后\s*(.+)/,
];

// 检测用户输入是否包含提醒指令
function parseReminder(text) {
  logReminder('INFO', `解析输入: "${text}"`);
  for (const pattern of REMINDER_PATTERNS) {
    const match = text.match(pattern);
    if (match) {
      let minutes = null;
      let content = '';
      
      if (pattern.source.startsWith('提醒我')) {
        // 格式：提醒我X分钟(后)...(内容)
        minutes = parseInt(match[1], 10);
        content = match[2] ? match[2].trim() : '';
      } else if (pattern.source.includes('分钟(?:后)?')) {
        // 格式：X分钟(后)提醒我...
        minutes = parseInt(match[1], 10);
        content = match[2] ? match[2].trim() : '';
      }
      
      if (minutes && minutes > 0 && minutes <= 1440) { // 最多24小时
        logReminder('SUCCESS', `匹配成功: ${minutes}分钟, 内容: "${content}"`);
        return { minutes, content };
      }
    }
  }
  logReminder('INFO', '未匹配到提醒格式，将调用AI处理');
  return null;
}

// 执行本地提醒
function executeReminder(minutes, content) {
  const delayMs = minutes * 60 * 1000;
  const petEmoji = currentPet?.emoji || '🐱';
  const petName = petManager ? petManager.getName() : (currentPet?.name || '小动物');
  
  logReminder('INFO', `设置提醒: ${minutes}分钟`);
  logReminder('INFO', `延迟时间: ${delayMs}ms (${minutes}分钟)`);
  logReminder('INFO', `当前宠物: ${petName} (${petEmoji})`);
  
  // 移除"提醒我"等前缀，获取纯内容
  let reminderContent = content;
  if (!reminderContent) {
    reminderContent = `${petName}提醒你：该休息一下啦！`;
  } else {
    reminderContent = `${petName}提醒你：${reminderContent}`;
  }
  logReminder('INFO', `提醒内容: "${reminderContent}"`);
  
  // 设置定时器
  setTimeout(() => {
    logReminder('TRIGGER', `⏰ 提醒触发！时间到！`);
    logReminder('INFO', `准备发送通知，内容: "${reminderContent}"`);
    
    triggerPetJump();
    
    // 检查浏览器是否支持通知
    if (!('Notification' in window)) {
      logReminder('WARNING', '浏览器不支持 Notification API，将使用 confirm() 作为 Fallback');
      logReminder('INFO', '手机端浏览器检测：使用 alert 弹窗');
      // 手机端或不支持通知的浏览器，使用 alert
      alert(`${petEmoji} ${reminderContent}`);
      logReminder('SUCCESS', 'Alert 弹窗已显示');
      return;
    }
    
    logReminder('INFO', `Notification 支持状态: 支持`);
    logReminder('INFO', `当前通知权限: ${Notification.permission}`);
    
    // 检查通知权限
    if (Notification.permission === 'granted') {
      logReminder('SUCCESS', '权限已授权，发送通知...');
      // 已有权限，直接发送通知
      try {
        logReminder('INFO', '尝试创建带 requireInteraction 的通知...');
        const notification = new Notification('慢慢贴提醒 ⏰', {
          body: reminderContent,
          icon: currentPet?.img || 'assets/icon.png',
          tag: 'reminder', // 防止重复通知
          requireInteraction: true, // 保持通知直到用户操作
        });
        
        notification.onclick = () => {
          logReminder('INFO', '用户点击了通知');
          window.focus();
          notification.close();
        };
        
        logReminder('SUCCESS', `✓ 通知已发送: "${reminderContent}"`);
        
        // 5秒后自动关闭
        setTimeout(() => {
          notification.close();
          logReminder('INFO', '通知已自动关闭');
        }, 5000);
      } catch (e) {
        logReminder('WARNING', `高级通知创建失败: ${e.message}，尝试简单版本`);
        // 某些浏览器可能不支持某些选项，使用简单版本
        try {
          const notification = new Notification('慢慢贴提醒 ⏰', {
            body: reminderContent,
            icon: currentPet?.img || 'assets/icon.png',
          });
          logReminder('SUCCESS', `✓ 简单通知已发送`);
        } catch (e2) {
          logReminder('ERROR', `通知创建失败: ${e2.message}`);
        }
      }
    } else if (Notification.permission !== 'denied') {
      logReminder('WARNING', '权限尚未授权，请求权限...');
      // 尚未请求权限，先请求
      Notification.requestPermission().then(permission => {
        logReminder('INFO', `权限请求结果: ${permission}`);
        if (permission === 'granted') {
          logReminder('SUCCESS', '权限已授权，重新执行提醒');
          executeReminder(minutes, content); // 重新执行
        } else {
          logReminder('WARNING', '权限被拒绝，使用 alert');
          alert(`${petEmoji} ${reminderContent}`);
        }
      });
    } else {
      logReminder('WARNING', '权限已被拒绝，使用 alert');
      alert(`${petEmoji} ${reminderContent}`);
    }
  }, delayMs);
  
  logReminder('SUCCESS', `✓ 定时器已设置，将于 ${minutes} 分钟后触发`);
}

// 请求通知权限（可选，用户可主动触发）
function requestNotificationPermission() {
  logReminder('INFO', '请求通知权限');
  
  if (!('Notification' in window)) {
    logReminder('WARNING', '浏览器不支持 Notification API');
    showBubble('您的浏览器不支持通知功能', 3000);
    return false;
  }
  
  logReminder('INFO', `当前通知权限: ${Notification.permission}`);
  
  if (Notification.permission === 'granted') {
    logReminder('SUCCESS', '权限已授权');
    showBubble('通知权限已开启 ✓', 2000);
    return true;
  }
  
  if (Notification.permission === 'denied') {
    logReminder('WARNING', '权限已被拒绝');
    showBubble('通知权限已被拒绝，请在浏览器设置中开启', 3000);
    return false;
  }
  
  // 请求权限
  logReminder('INFO', '正在请求通知权限...');
  Notification.requestPermission().then(permission => {
    logReminder('INFO', `权限请求结果: ${permission}`);
    if (permission === 'granted') {
      logReminder('SUCCESS', '权限已授权');
      showBubble('已开启通知权限 ✓', 2000);
    } else {
      logReminder('WARNING', '权限请求被拒绝');
      showBubble('通知权限请求被拒绝', 2000);
    }
  });
  return null;
}

// 检查并返回是否应该继续调用AI
function checkAndHandleReminder(text) {
  logReminder('INFO', `检查输入: "${text}"`);
  
  // 检查是否是提醒指令
  const reminder = parseReminder(text);
  
  if (reminder) {
    // 成功解析到提醒
    if (!reminder.content || reminder.content.length < 1) {
      // 没有提醒内容，提示用户
      logReminder('WARNING', '提醒格式不完整，缺少内容');
      showReminderFormatError();
      return false; // 不调用AI
    }
    
    logReminder('SUCCESS', '准备设置提醒，不调用AI');
    // 显示确认消息
    showReminderConfirm(reminder.minutes, reminder.content);
    
    // 执行提醒
    executeReminder(reminder.minutes, reminder.content);
    
    return false; // 不调用AI
  }
  
  // 检查是否是格式错误的提醒（如"提醒我喝水"没有时间）
  if (/^提醒我[^\d]+$/.test(text) || /提醒我(.+)/.test(text) && !/\d/.test(text)) {
    if (text.includes('提醒')) {
      logReminder('WARNING', '输入包含"提醒"但缺少时间');
      showReminderFormatError();
      return false;
    }
  }
  
  logReminder('INFO', '不是提醒指令，将调用AI处理');
  return true; // 继续调用AI
}

async function callAI(message) {
  if (isChatLoading) return;
  
  // ★★★ 在发送消息给 AI 之前，先检查是否是提醒指令 ★★★
  if (!checkAndHandleReminder(message)) {
    // 如果是提醒指令，已经处理完毕，不需要调用 AI
    isChatLoading = false;
    return;
  }
  
  isChatLoading = true;
  showChatLoading(true);
  hideChatError();
  
  // 添加用户消息
  chatMessages.push({ role: 'user', content: message });
  
  // 保持最近 10 轮对话
  if (chatMessages.length > AI_CONFIG.maxHistory * 2) {
    chatMessages = chatMessages.slice(-AI_CONFIG.maxHistory * 2);
  }
  
  renderChatMessages();
  
  try {
    // 创建超时控制器
    const controller = new AbortController();
    const timeoutId = setTimeout(() => {
      controller.abort();
    }, 30000); // 30秒超时
    
    const response = await fetch(AI_CONFIG.apiUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${AI_CONFIG.apiKey}`,
      },
      body: JSON.stringify({
        model: AI_CONFIG.model,
        messages: buildMessages(),
        temperature: AI_CONFIG.temperature,
        max_tokens: 500,
      }),
      signal: controller.signal,
    });
    
    clearTimeout(timeoutId);
    
    let data;
    try {
      data = await response.json();
    } catch (parseError) {
      throw new Error('服务器返回的数据格式有误，请稍后重试');
    }
    
    if (!response.ok) {
      const errorMsg = parseApiError(data, response.status);
      throw new Error(errorMsg);
    }
    
    const reply = data.choices?.[0]?.message?.content || '我不太明白你说的话呢...';
    
    chatMessages.push({ role: 'assistant', content: reply });
    
    // 保持最近 10 轮对话
    if (chatMessages.length > AI_CONFIG.maxHistory * 2) {
      chatMessages = chatMessages.slice(-AI_CONFIG.maxHistory * 2);
    }
    
    renderChatMessages();
    triggerPetJump();
    
  } catch (error) {
    const friendlyMsg = getFriendlyErrorMessage(error);
    showChatError(friendlyMsg);
    // 移除刚才添加的用户消息（因为没有成功发送）
    chatMessages.pop();
    renderChatMessages();
  } finally {
    isChatLoading = false;
    showChatLoading(false);
  }
}

// 解析 API 错误响应
function parseApiError(data, status) {
  const errorCode = data.error?.code;
  const errorMsg = data.error?.message || data.message || '未知错误';
  
  // 常见的智谱 API 错误码处理
  const errorMap = {
    '401': 'API Key 无效或已过期，请检查密钥配置',
    '403': '您的账号没有权限访问该资源',
    '404': '请求的资源不存在',
    '429': '请求过于频繁，请稍后再试',
    '500': '服务器内部错误，请稍后重试',
    '502': '网关错误，请稍后重试',
    '503': '服务暂时不可用，请稍后重试',
    '504': '网关超时，请稍后重试',
  };
  
  if (errorMap[status]) {
    return errorMap[status];
  }
  
  // 智谱 API 特定错误码
  if (errorCode === 'invalid_api_key') {
    return 'API Key 无效，请检查您的密钥';
  }
  if (errorCode === 'api_key_expired') {
    return 'API Key 已过期，请重新获取';
  }
  if (errorCode === 'quota_exceeded') {
    return 'API 调用额度已用完，请稍后再试或升级套餐';
  }
  if (errorCode === 'rate_limit_exceeded') {
    return '请求过于频繁，请稍后再试';
  }
  if (errorCode === 'model_not_found') {
    return '模型不存在或不可用';
  }
  
  return errorMsg;
}

// 获取友好的错误提示信息
function getFriendlyErrorMessage(error) {
  if (error.name === 'AbortError') {
    return '请求超时了，网络可能不太稳定，请稍后重试';
  }
  if (error.name === 'TypeError') {
    // 网络连接错误
    if (error.message.includes('Failed to fetch') || 
        error.message.includes('NetworkError')) {
      return '网络连接失败，请检查网络后重试';
    }
    if (error.message.includes('CORS')) {
      return '跨域请求被阻止，请检查网络设置';
    }
  }
  return error.message || '发生未知错误，请稍后重试';
}

function renderTasks() {

    del.addEventListener('click', () => deleteTask(i));

function addTask() {
  const text = newInput.value.trim();
  if (!text) return;
  tasks.push({ text, done: false });
  newInput.value = '';
  save();
  renderTasks();
}

function toggleTask(i) {
  if (tasks[i].done) {
    tasks[i].done = false;
  } else {
    tasks[i].done = true;
    const pool = customEncouragements.length > 0 ? customEncouragements : ENCOURAGE;
    const msg = pool[Math.floor(Math.random() * pool.length)];
    showBubble(msg);
    addEgg(1);
    triggerPetJump();
    if (typeof agent !== 'undefined') {
      setTimeout(() => agent.onTaskCompleted(), 2700);
    }
  }
  save();
  renderTasks();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
  renderTasks();
}

function buildPWAManifest() {
  function drawIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.12;

    ctx.fillStyle = '#FFF9C4';
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath(); ctx.fill();

    const cs = size * 0.22;
    ctx.fillStyle = '#e6d97a';
    ctx.beginPath();
    ctx.moveTo(size - cs, 0); ctx.lineTo(size, 0); ctx.lineTo(size, cs);
    ctx.closePath(); ctx.fill();

    ctx.strokeStyle = '#c8b97a';
    ctx.lineWidth = size * 0.022;
    ctx.setLineDash([size * 0.045, size * 0.03]);
    for (let i = 0; i < 3; i++) {
      const y = size * 0.38 + i * size * 0.15;
      ctx.beginPath(); ctx.moveTo(size * 0.16, y); ctx.lineTo(size * 0.72, y); ctx.stroke();
    }

    ctx.setLineDash([]);
    ctx.font = `${Math.round(size * 0.38)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('📝', size * 0.5, size * 0.62);

    return c.toDataURL('image/png');
  }

  try {
    const manifest = {
      name: '慢慢贴', short_name: '慢慢贴',
      description: 'ADHD友好型情绪陪伴与任务管理工具',
      start_url: './', display: 'standalone',
      background_color: '#FFF9C4', theme_color: '#FFF9C4',
      orientation: 'portrait-primary',
      icons: [
        { src: drawIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any' },
        { src: drawIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
        { src: 'icon.svg',    sizes: 'any',     type: 'image/svg+xml' },
      ],
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(blob);
  } catch (e) { }
}

// ============================================================
//  拖拽（桌面）
// ============================================================
let isDragging = false;
let dragOffsetX = 0, dragOffsetY = 0;

sticky.addEventListener('mousedown', (e) => {
  if (['INPUT','BUTTON','TEXTAREA'].includes(e.target.tagName)) return;
  isDragging = true;
  dragOffsetX = e.clientX - sticky.getBoundingClientRect().left;
  dragOffsetY = e.clientY - sticky.getBoundingClientRect().top;
  sticky.classList.add('dragging');
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  let x = e.clientX - dragOffsetX;
  let y = e.clientY - dragOffsetY;
  x = Math.max(0, Math.min(window.innerWidth  - sticky.offsetWidth,  x));
  y = Math.max(0, Math.min(window.innerHeight - sticky.offsetHeight, y));
  sticky.style.left = x + 'px';
  sticky.style.top  = y + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  sticky.classList.remove('dragging');
  LS.set('sl_pos', { x: parseInt(sticky.style.left), y: parseInt(sticky.style.top) });
});

// ============================================================
//  触摸拖拽（手机）
// ============================================================
let touchOffX = 0, touchOffY = 0;
sticky.addEventListener('touchstart', (e) => {
  if (['INPUT','BUTTON'].includes(e.target.tagName)) return;
  const t = e.touches[0];
  touchOffX = t.clientX - sticky.getBoundingClientRect().left;
  touchOffY = t.clientY - sticky.getBoundingClientRect().top;
}, { passive: true });

sticky.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  let x = t.clientX - touchOffX;
  let y = t.clientY - touchOffY;
  x = Math.max(0, Math.min(window.innerWidth  - sticky.offsetWidth,  x));
  y = Math.max(0, Math.min(window.innerHeight - sticky.offsetHeight, y));
  sticky.style.left = x + 'px';
  sticky.style.top  = y + 'px';
  e.preventDefault();
}, { passive: false });

sticky.addEventListener('touchend', () => {
  LS.set('sl_pos', { x: parseInt(sticky.style.left), y: parseInt(sticky.style.top) });
});

// ============================================================
//  恢复位置
// ============================================================
function restorePosition() {
  if (window.innerWidth <= 480) return;
  const pos = LS.get('sl_pos', null);
  if (pos) {
    sticky.style.left = Math.min(pos.x, window.innerWidth  - sticky.offsetWidth)  + 'px';
    sticky.style.top  = Math.min(pos.y, window.innerHeight - sticky.offsetHeight) + 'px';
  } else {
    sticky.style.left = Math.max(0, (window.innerWidth  / 2 - 210)) + 'px';
    sticky.style.top  = Math.max(0, (window.innerHeight / 2 - 250)) + 'px';
  }
}

const SELF_ATTACK_RE = /懒|差劲|废物|没用|不行|糟糕|失败|蠢|笨|stupid|lazy|useless/i;
const SELF_ATTACK_RE2 = /我(?:真|好|就是|总是)?(?:懒|差劲|废物|没用|不行|糟糕|失败|蠢|笨)/;

const encourageModal   = document.getElementById('encourage-modal');
const encourageArea    = document.getElementById('encourage-textarea');
const encourageWarn    = document.getElementById('encourage-warn');
const encourageSaveBtn = document.getElementById('encourage-save');
const encourageCancelBtn = document.getElementById('encourage-cancel');
const openEncourageBtn = document.getElementById('open-encourage');

openEncourageBtn.addEventListener('click', () => {
  encourageArea.value = customEncouragements.join('\n');
  encourageWarn.style.display = 'none';
  encourageModal.classList.add('show');
});

encourageCancelBtn.addEventListener('click', () => {
  encourageModal.classList.remove('show');
});
encourageModal.addEventListener('click', (e) => {
  if (e.target === encourageModal) encourageModal.classList.remove('show');
});

encourageSaveBtn.addEventListener('click', () => {
  const lines = encourageArea.value
    .split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0);

  const bad = lines.find(l => SELF_ATTACK_RE.test(l) || SELF_ATTACK_RE2.test(l));
  if (bad) {
    encourageWarn.textContent = '不攻击自己，也是行动的一部分 💛';
    encourageWarn.style.display = 'block';
    return;
  }

  customEncouragements = lines;
  LS.set('custom_encouragements', customEncouragements);
  encourageModal.classList.remove('show');
  showBubble('保存成功！下次完成任务时会用到～', 2500);
});

// ============================================================
//  打开桌宠助手
// ============================================================
document.getElementById('open-pet-helper').addEventListener('click', () => {
  location.href = 'pet.html';
});

// ============================================================
//  🤖 Agent 行为系统
// ============================================================
const agent = {
  lastActiveTime: Date.now(),
  cooldown: {},
  COOLDOWN_MS: 30 * 60 * 1000,
  centerRestoreTimer: null,
  centerOriginalPos: null,
  isAtCenter: false,
  rules: [],
  celebrationRule: null,

  sense() {
    const now = Date.now();
    const idleDuration = now - this.lastActiveTime;
    const doneToday = tasks.filter(t => t.done).length;
    const hour = new Date().getHours();
    let timeOfDay;
    if (hour >= 6 && hour < 12)       timeOfDay = 'morning';
    else if (hour >= 12 && hour < 18) timeOfDay = 'afternoon';
    else                              timeOfDay = 'evening';
    return { now, idleDuration, doneToday, hour, timeOfDay };
  },

  resetTimer() {
    this.lastActiveTime = Date.now();
  },

  inCooldown(ruleId) {
    const last = this.cooldown[ruleId];
    return last && (Date.now() - last < this.COOLDOWN_MS);
  },
  markFired(ruleId) {
    this.cooldown[ruleId] = Date.now();
  },

  decide() {
    const ctx = this.sense();
    for (const rule of this.rules) {
      if (this.inCooldown(rule.id)) continue;
      if (rule.condition(ctx)) {
        rule.action(ctx);
        this.markFired(rule.id);
        break;
      }
    }
  },

  onTaskCompleted() {
    const ctx = this.sense();
    const rule = this.celebrationRule;
    if (!rule || this.inCooldown(rule.id)) return;
    if (rule.condition(ctx)) {
      rule.action(ctx);
      this.markFired(rule.id);
    }
  },
};

agent.rules.push({
  id: 'sit-too-long',
  condition: (ctx) => ctx.idleDuration >= 45 * 60 * 1000,
  action: () => {
    triggerPetShake();
    showBubble('起来走一走，喝杯水 🌿', 5000);
    addEgg(1);
  },
});

agent.rules.push({
  id: 'good-night',
  condition: (ctx) => ctx.idleDuration >= 30 * 60 * 1000 && ctx.hour >= 22,
  action: () => {
    showBubble('已经很晚了，该休息啦，明天再做也可以 🌙', 5000);
  },
});

agent.rules.push({
  id: 'gentle-stretch',
  condition: (ctx) =>
    ctx.idleDuration >= 30 * 60 * 1000 &&
    ctx.idleDuration < 45 * 60 * 1000,
  action: () => {
    showBubble('要不要伸个懒腰？就一分钟。', 4000);
    if (currentPet) {
      petDisplay.classList.remove('pet-jump', 'pet-shake');
      petDisplay.classList.add('pet-float');
    }
  },
});

agent.rules.push({
  id: 'morning-encourage',
  condition: (ctx) => ctx.timeOfDay === 'morning' && ctx.doneToday === 0,
  action: () => {
    showBubble('早上好！今天完成一件小事就很棒了 ☀️', 4000);
  },
});

agent.celebrationRule = {
  id: 'celebrate',
  condition: (ctx) => ctx.doneToday >= 3,
  action: (ctx) => {
    showBubble(`今天已经完成 ${ctx.doneToday} 件事啦！送你一颗彩蛋 🎉`, 3500);
    addEgg(1);
  },
};

// ============================================================
//  初始化
// ============================================================
function init() {
  restorePosition();
  applyColor(stickyColor);
  renderEggs();
  renderPet();
  renderTasks();
  checkYesterday();
  if (currentPet) petDisplay.classList.add('pet-float');
  agent.resetTimer();
  setTimeout(() => agent.decide(), 1000);
}

init();
</script>
