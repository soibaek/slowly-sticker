<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>慢慢贴</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>📝</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#FFF9C4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="慢慢贴" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    /* ========== 主题变量（可换肤） ========== */
    /* --ink: 边框/分割线/标题/正文等"巧克力色"；--shadow: 硬阴影色 */
    :root {
      --ink: #5D4037;
      --ink-soft: #c8b97a;   /* 次级分割线/虚线/滚动条 */
      --shadow: #C8B97A;     /* 硬阴影 */
      --note-bg: #FFF9C4;    /* 便利贴默认底色（由 JS 覆盖） */
      --panel: var(--panel);      /* 内层面板/任务框底色 */
      --panel-alt: var(--panel-alt);  /* 任务隔行底色 */
    }

    /* ========== 全局 ========== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background-color: #D9D2B0;
      background-image:
        linear-gradient(rgba(120,104,60,0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(120,104,60,0.18) 1px, transparent 1px);
      background-size: 24px 24px;
      image-rendering: pixelated;
      font-family: 'Press Start 2P', monospace;
      overflow: auto;
      position: relative;
    }

    /* ========== 便利贴主体 ========== */
    #sticky {
      position: absolute;
      width: 420px;
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;                 /* 像素风：无圆角 */
      box-shadow: 6px 6px 0 var(--shadow);    /* 硬阴影 */
      padding: 0;
      user-select: none;
      transition: opacity 0.1s;
      image-rendering: pixelated;
      /* 折角效果 */
      --corner-size: 26px;
      clip-path: polygon(
        0 0,
        calc(100% - var(--corner-size)) 0,
        100% var(--corner-size),
        100% 100%,
        0 100%
      );
    }
    #sticky::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: var(--corner-size, 26px);
      height: var(--corner-size, 26px);
      background: #FFF9C4;
      border-left: 3px solid var(--ink);
      border-bottom: 3px solid var(--ink);
      clip-path: polygon(0 0, 100% 100%, 100% 0);
      z-index: 3;
    }
    #sticky.dragging { opacity: 0.85; }

    /* 内容内边距容器 */
    #sticky-body { padding: 14px 16px 16px; }

    /* ========== 头部（深褐色条） ========== */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--ink);
      padding: 12px 14px;
      cursor: move;
    }
    #header h1 {
      font-size: 13px;
      color: #FFF9C4;
      letter-spacing: 3px;
    }
    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 4px;
      border-radius: 0;
      transition: transform 0.1s;
      filter: saturate(1.1);
    }
    .icon-btn:active { transform: translateY(2px); }

    /* ========== 彩蛋 / 小动物面板 ========== */
    #pet-panel {
      display: flex;
      align-items: center;
      gap: 14px;
      border: 3px solid var(--ink);
      background: var(--panel);
      padding: 12px;
      margin-bottom: 12px;
      box-shadow: 4px 4px 0 var(--shadow);
    }
    /* 左侧像素动物方框 64x64 */
    #pet-box {
      width: 72px;
      flex-shrink: 0;
      text-align: center;
    }
    #pet-display {
      width: 64px;
      height: 64px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      line-height: 1;
      background: transparent;     /* 完全透明 */
      cursor: pointer;
      image-rendering: pixelated;
      transition: transform 0.15s;
    }
    #pet-display img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }
    #pet-display:hover { transform: scale(1.08); }
    #pet-display.empty {
      background: transparent;
      border: 3px dashed var(--ink-soft);
      color: var(--ink-soft);
      font-size: 30px;
    }
    #pet-name {
      display: block;
      margin-top: 5px;
      font-size: 8px;
      color: var(--ink);
    }
    /* 右侧彩蛋信息 */
    #egg-bar {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 6px;
      font-size: 8px;
      color: #795548;
    }
    #egg-line { display: flex; align-items: center; gap: 6px; }
    #egg-line .egg-emoji { font-size: 22px; }
    #egg-line .egg-img {
      width: 30px; height: 30px;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }
    #egg-count { font-weight: bold; color: #e65100; font-size: 14px; }
    #egg-hint { font-size: 7px; color: #a98c6a; line-height: 1.7; }

    .pixel-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      padding: 7px 10px;
      border: 2px solid var(--ink);
      border-radius: 0;
      cursor: pointer;
      background: #F5E6B8;
      color: var(--ink);
      box-shadow: 3px 3px 0 var(--ink);
      transition: all 0.08s;
      line-height: 1.4;
    }
    .pixel-btn:active {
      box-shadow: none;
      transform: translate(3px, 3px);
    }
    .pixel-btn.primary { background: #FFE082; }
    .pixel-btn.comfort { background: #F8BBD0; }
    #hatch-btn { background: var(--panel); }

    /* ========== 小动物区域（保留占位，主显示已并入 pet-panel） ========== */
    #pet-zone { display: none; }

    /* ========== 气泡提示 ========== */
    #bubble {
      position: absolute;
      right: 50px;
      top: 80px;
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 8px;
      color: #333;
      max-width: 180px;
      line-height: 1.6;
      box-shadow: 2px 2px 0 var(--ink);
      z-index: 10;
      display: none;
      word-break: break-all;
    }
    #bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      right: 14px;
      border: 4px solid transparent;
      border-top-color: var(--ink);
    }

    /* ========== 孵化动画 ========== */
    #hatch-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #hatch-overlay.show { display: flex; }
    #hatch-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 24px 32px;
      text-align: center;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      animation: hatchIn 0.4s ease;
    }
    @keyframes hatchIn {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    #hatch-anim { font-size: 52px; display: block; margin-bottom: 12px; animation: hatchPop 0.6s ease 0.3s both; }
    #hatch-anim img {
      width: 96px; height: 96px;
      object-fit: contain;
      image-rendering: pixelated;
      display: inline-block;
    }
    @keyframes hatchPop {
      0%   { transform: scale(0.4); }
      60%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    /* ========== 任务清单标题条 ========== */
    #task-head {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--ink);
      color: #FFF9C4;
      font-size: 9px;
      letter-spacing: 1px;
      padding: 6px 8px;
      border: 3px solid var(--ink);
      border-bottom: none;
    }
    #task-head .sq { width: 8px; height: 8px; background: #FFF9C4; display: inline-block; }

    /* ========== 任务列表 ========== */
    #task-list {
      list-style: none;
      max-height: 180px;
      overflow-y: auto;
      margin-bottom: 12px;
      border: 3px solid var(--ink);
      background: var(--panel);
      box-shadow: 4px 4px 0 var(--shadow);
    }
    #task-list::-webkit-scrollbar { width: 6px; }
    #task-list::-webkit-scrollbar-thumb { background: var(--ink-soft); border-radius: 0; }
    .task-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-bottom: 2px dashed #E0D68A;
      font-size: 9px;
      color: #4e342e;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item:nth-child(even) { background: var(--panel-alt); }
    /* 方形像素复选框 */
    .task-item input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 16px; height: 16px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: var(--panel);
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
    }
    .task-item input[type="checkbox"]:checked {
      background: #F6A623;
    }
    .task-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 3px; top: 0px;
      width: 5px; height: 9px;
      border: solid var(--ink);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    .task-item .task-text {
      flex: 1;
      word-break: break-all;
      line-height: 1.6;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: #bcaaa4;
    }
    .task-item .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      color: #8d6e63;
      flex-shrink: 0;
      opacity: 0.6;
      transition: opacity 0.1s;
    }
    .task-item .del-btn:hover { opacity: 1; }

    /* ========== 添加任务 ========== */
    #add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    #new-task-input {
      flex: 1;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 9px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: var(--panel);
      color: #4e342e;
      outline: none;
      box-shadow: 3px 3px 0 var(--shadow);
    }
    #new-task-input:focus { border-color: #F6A623; }

    /* ========== 底部按钮行 ========== */
    #bottom-bar {
      display: flex;
      gap: 8px;
      align-items: stretch;
      margin-bottom: 12px;
    }
    #bottom-bar .pixel-btn { flex: 1; }
    /* 自定义鼓励语：紧挨缓一缓的小方形按钮 */
    #open-encourage {
      flex: 0 0 auto;
      width: 44px;
      padding: 7px 0;
      font-size: 14px;
      text-align: center;
    }

    /* ========== 分隔虚线 ========== */
    #divider {
      border: none;
      border-top: 2px dashed var(--ink-soft);
      margin: 4px 0 10px;
    }

    /* ========== 打开桌宠助手（整行大按钮） ========== */
    #open-pet-helper {
      display: block;
      width: 100%;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      padding: 12px;
      border: 3px solid var(--ink);
      border-radius: 0;
      background: #F5E6B8;
      color: var(--ink);
      cursor: pointer;
      box-shadow: 4px 4px 0 var(--shadow);
      transition: all 0.08s;
    }
    #open-pet-helper:active {
      box-shadow: none;
      transform: translate(4px, 4px);
    }

    /* ========== 底部小字 ========== */
    #footer {
      font-size: 7px;
      color: #a1887f;
      text-align: center;
      margin-top: 4px;
      margin-bottom: 12px;
      line-height: 1.8;
    }

    /* ========== 收集册弹窗 ========== */
    #collection-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #collection-modal.show { display: flex; }
    #collection-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 20px;
      width: min(320px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
    }
    #collection-box h2 { font-size: 10px; margin-bottom: 12px; }
    .coll-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 4px;
      border-bottom: 1px dashed var(--ink-soft);
      font-size: 8px;
    }
    .coll-emoji { font-size: 22px; }
    .coll-info { line-height: 1.8; }
    #close-coll {
      float: right;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
    }

    /* ========== 颜色选择器 ========== */
    #color-picker-popup {
      position: absolute;
      top: 36px;
      right: 8px;
      background: #fff;
      border: 2px solid var(--ink);
      border-radius: 8px;
      padding: 8px;
      display: none;
      gap: 6px;
      flex-wrap: wrap;
      width: 110px;
      box-shadow: 3px 3px 0 var(--ink);
      z-index: 20;
    }
    #color-picker-popup.show { display: flex; }
    .color-dot {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 2px solid var(--ink);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .color-dot:hover { transform: scale(1.2); }
    .color-dot.active { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--ink); }

    /* ========== 收集册网格 ========== */
    #coll-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-top: 8px;
    }
    .coll-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--panel);
      border: 2px solid var(--ink-soft);
      border-radius: 6px;
      padding: 6px 4px;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
      font-size: 7px;
      color: var(--ink);
      text-align: center;
      gap: 2px;
    }
    .coll-cell:hover { transform: scale(1.05); }
    .coll-cell.current { border-color: #f9a825; background: #fff9c4; box-shadow: 0 0 0 2px #f9a825; }
    .coll-cell .cell-emoji { font-size: 20px; }
    .coll-cell .cell-img {
      width: 32px; height: 32px;
      object-fit: contain;
      image-rendering: pixelated;
      display: block;
    }
    .coll-cell .cell-count { color: #a1887f; font-size: 6px; }

    /* ========== 历史任务弹窗 ========== */
    #history-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 200;
    }
    #history-modal.show { display: flex; }
    #history-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 20px;
      width: min(320px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
    }
    #history-box h2 { font-size: 10px; margin-bottom: 12px; }
    .hist-day {
      border: 1px solid var(--ink-soft);
      border-radius: 6px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .hist-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 8px;
      background: var(--panel);
      cursor: pointer;
      font-size: 8px;
    }
    .hist-day-header:hover { background: #fff9c4; }
    .hist-day-tasks {
      display: none;
      padding: 6px 8px;
      background: #fff;
      font-size: 7px;
      line-height: 2;
    }
    .hist-day-tasks.open { display: block; }
    .hist-task-row { display: flex; align-items: center; gap: 4px; }
    .hist-task-row .done-mark { color: #f9a825; }
    .hist-task-row .undone-mark { color: #bcaaa4; }

    /* ========== 昨日顺延对话框 ========== */
    #yesterday-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 300;
    }
    #yesterday-modal.show { display: flex; }
    #yesterday-box {
      background: #FFF9C4;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 24px 20px;
      width: min(300px, 88vw);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      text-align: center;
      line-height: 2;
    }
    #yesterday-box p { margin-bottom: 16px; font-size: 8px; }
    #yesterday-box .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

    /* ========== PWA 安装条 ========== */
    #pwa-banner {
      position: fixed;
      bottom: 16px; left: 50%; transform: translateX(-50%);
      background: var(--ink);
      color: #fff9c4;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px 14px;
      border-radius: 8px;
      display: none;
      align-items: center;
      gap: 10px;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      z-index: 400;
    }
    #pwa-banner.show { display: flex; }
    #pwa-install-btn { background: #ffe082; color: var(--ink); border: none; border-radius: 4px;
      font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 4px 8px; cursor: pointer; }
    #pwa-dismiss-btn { background: none; border: none; color: #fff9c4; cursor: pointer; font-size: 12px; }

    /* ========== 小动物动画 ========== */
    .pet-float {
      animation: petFloat 2s ease-in-out infinite;
    }
    @keyframes petFloat {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-5px); }
    }
    .pet-jump {
      animation: petJump 0.3s ease-out;
    }
    @keyframes petJump {
      0%   { transform: translateY(0); }
      40%  { transform: translateY(-12px); }
      100% { transform: translateY(0); }
    }
    .pet-shake {
      animation: petShake 0.4s ease-in-out 3;
    }
    @keyframes petShake {
      0%, 100% { transform: translateX(0); }
      25%      { transform: translateX(-5px) rotate(-5deg); }
      75%      { transform: translateX(5px) rotate(5deg); }
    }

    /* ========== 自定义鼓励语弹窗 ========== */
    #encourage-modal {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: none; align-items: center; justify-content: center;
      z-index: 250;
    }
    #encourage-modal.show { display: flex; }
    #encourage-box {
      background: #fff;
      border: 3px solid var(--ink);
      border-radius: 0;
      padding: 18px;
      width: min(320px, 90vw);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
    }
    #encourage-box h2 { font-size: 11px; margin-bottom: 10px; }
    #encourage-box p.hint {
      font-size: 7px; color: #a1887f;
      line-height: 1.8; margin-bottom: 8px;
    }
    #encourage-textarea {
      width: 100%;
      min-height: 110px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 8px;
      border: 2px solid var(--ink);
      border-radius: 0;
      background: #fffdeb;
      color: #4e342e;
      resize: vertical;
      outline: none;
      margin-bottom: 10px;
      line-height: 1.7;
    }
    #encourage-textarea:focus { border-color: #F6A623; }
    #encourage-box .btn-row {
      display: flex; gap: 8px; justify-content: flex-end;
    }
    #encourage-warn {
      font-size: 7px; color: #c62828;
      margin-bottom: 8px; display: none;
      line-height: 1.8;
    }

    /* ========== 响应式：手机 ========== */
    @media (max-width: 480px) {
      #sticky {
        width: 90vw !important;
        left: 5vw !important;
        top: 20px !important;
        position: relative;
      }
      body { display: flex; justify-content: center; }
    }
  </style>
</head>
<body>

<!-- 便利贴 -->
<div id="sticky">
  <!-- 折角 pseudo-element via CSS -->

  <!-- 头部（深褐色条） -->
  <div id="header">
    <h1>慢慢贴</h1>
    <div style="display:flex;gap:4px">
      <button class="icon-btn" id="open-history" title="历史任务">📅</button>
      <button class="icon-btn" id="open-color" title="换颜色">🎨</button>
      <button class="icon-btn" id="open-coll" title="收集册">📖</button>
    </div>
  </div>

  <div id="sticky-body">
    <!-- 颜色选择器弹出层 -->
    <div id="color-picker-popup"></div>

    <!-- 彩蛋 / 小动物面板 -->
    <div id="pet-panel">
      <!-- 左：像素动物方框 -->
      <div id="pet-box">
        <div id="pet-display" class="empty" title="点击互动"></div>
        <span id="pet-name"></span>
      </div>
      <!-- 右：彩蛋信息 + 孵化 -->
      <div id="egg-bar">
        <div id="egg-line">
          <img class="egg-img" src="assets/eggs/egg_plain.png" alt="蛋" />
          <span id="egg-count">0</span>
        </div>
        <div id="egg-hint">完成任务<br>可获彩蛋</div>
        <button class="pixel-btn primary" id="hatch-btn" style="display:none">孵化 Hatch</button>
      </div>

    <!-- 兼容旧逻辑的隐藏区 -->
    <div id="pet-zone"></div>
    <div id="bubble"></div>

    <!-- 任务清单标题条 -->
    <div id="task-head"><span class="sq"></span>任务清单</div>

    <ul id="task-list"></ul>

    <!-- 添加任务 -->
    <div id="add-row">
      <input id="new-task-input" type="text" placeholder="写下来就赢了…" maxlength="40" />
      <button class="pixel-btn primary" id="add-task-btn">＋添加</button>
    </div>

    <!-- 底部按钮 -->
    <div id="bottom-bar">
      <button class="pixel-btn comfort" id="comfort-btn">🤗 安慰</button>
      <button class="pixel-btn" id="defer-btn">➡️ 缓一缓</button>
      <button class="pixel-btn" id="open-encourage" title="✏️ 自定义鼓励语 — 写下你想听的话">✏️</button>
    </div>

    <!-- 分隔虚线 -->
    <hr id="divider" />

    <!-- 页脚 -->
    <div id="footer">不着急，慢慢贴，能写下来已经很棒了。</div>

    <!-- 打开桌宠助手 -->
    <button id="open-pet-helper">🐾 打开桌宠助手</button>
  </div>
</div>

<!-- 孵化动画弹窗 -->
<div id="hatch-overlay">
  <div id="hatch-box">
    <span id="hatch-anim"><img src="assets/eggs/egg_plain.png" alt="蛋" onerror="this.parentNode.textContent='🥚'"></span>
    <div id="hatch-msg">正在孵化…</div>
  </div>
</div>

<!-- 历史任务弹窗 -->
<div id="history-modal">
  <div id="history-box">
    <button class="pixel-btn" id="close-history" style="float:right;font-size:8px">✕ 关闭</button>
    <h2>📅 历史任务</h2>
    <div id="history-list"></div>
  </div>
</div>

<!-- 昨日顺延对话框 -->
<div id="yesterday-modal">
  <div id="yesterday-box">
    <p id="yesterday-msg"></p>
    <div class="btn-row">
      <button class="pixel-btn primary" id="yesterday-keep">移到今天</button>
      <button class="pixel-btn comfort" id="yesterday-drop">让它们消失</button>
      <button class="pixel-btn" id="yesterday-close">先不管</button>
    </div>
  </div>
</div>

<!-- PWA 安装横幅 -->
<div id="pwa-banner">
  <span>📲 添加到桌面</span>
  <button id="pwa-install-btn">安装</button>
  <button id="pwa-dismiss-btn">✕</button>
</div>

<!-- 自定义鼓励语弹窗 -->
<div id="encourage-modal">
  <div id="encourage-box">
    <h2>✏️ 自定义鼓励语</h2>
    <p class="hint">每行一句，完成任务时会用到。<br>请不要攻击自己～</p>
    <div id="encourage-warn"></div>
    <textarea id="encourage-textarea" placeholder="你很棒&#10;慢慢来也没关系&#10;能开始就已经很好了"></textarea>
    <div class="btn-row">
      <button class="pixel-btn" id="encourage-cancel">取消</button>
      <button class="pixel-btn primary" id="encourage-save">保存</button>
    </div>
  </div>
</div>

<!-- 收集册弹窗 -->
<div id="collection-modal">
  <div id="collection-box">
    <button class="pixel-btn" id="close-coll">✕ 关闭</button>
    <h2>📖 小动物收集册</h2>
    <div id="coll-egg-total"></div>
    <div id="coll-grid"></div>
  </div>
</div>

<script>
// ============================================================
//  常量与数据
// ============================================================
const ANIMALS = [
  { emoji: '🐱', name: '小咪',   img: 'assets/pets/cat.png' },
  { emoji: '🐶', name: '小汪',   img: 'assets/pets/dog.png' },
  { emoji: '🐰', name: '小兔兔', img: 'assets/pets/rabbit.png' },
  { emoji: '🐍', name: '小蛇蛇', img: 'assets/pets/snake.png' },
  { emoji: '🐹', name: '仓鼠球', img: 'assets/pets/hamster.png' },
  { emoji: '🦊', name: '小狐',   img: 'assets/pets/fox.png' },
  { emoji: '🐻', name: '小熊熊', img: 'assets/pets/bear.png' },
  { emoji: '🦝', name: '小浣熊', img: 'assets/pets/redpanda.png' },
];

// 蛋图片：彩蛋计数用普通蛋，孵化动画用蛋壳序列
const EGG_IMG = {
  plain:   'assets/eggs/egg_plain.png',
  rainbow: 'assets/eggs/egg_rainbow.png',
  heart:   'assets/eggs/egg_heart.png',
  blue:    'assets/eggs/egg_blue.png',   // 裂开（蓝）
  green:   'assets/eggs/egg_green.png',  // 裂开（绿）
};
// 孵化时随机用一种"裂开"蛋壳
const CRACKED_EGGS = [EGG_IMG.blue, EGG_IMG.green];

// 兼容旧存档：根据 emoji 或名称找回对应的像素图片
function resolvePetImg(item) {
  const hit = ANIMALS.find(a => a.emoji === item.emoji || a.name === item.name);
  return hit ? hit.img : null;
}

const ENCOURAGE = [
  '你从"不想做"到"做了"，这中间的努力只有你自己知道。',
  '完成一件事，不管多小，都是真实发生的进展。',
  '你做到了。不需要再证明什么了。',
  '每一步都算数，包括刚才那一步。',
  '你没有落后。你一直在以自己的节奏前进。',
  '这件事现在已经完成了，它不会再来打扰你了。',
  '你比昨天的自己多做了一件事。',
];

const COMFORT = [
  '你没有失败，你只是在为"能做到"的那天积蓄能量。',
  '今天不想动是正常的，大脑也需要充电。',
  '休息不是偷懒，是为了之后能继续走。',
  '什么都没做也没关系，你今天还是存在着，这件事本身就有价值。',
  '不用和任何人比节奏，你的节奏就是对的节奏。',
  '任务可以等，但你现在的感受更重要。',
];

const PET_TALK = [
  (n) => `${n} 待在你旁边，没有别的意思，就是陪着你。`,
  (n) => `${n} 说：今天不想做也没关系，我们可以一起发呆。`,
  (n) => `${n} 轻轻靠了过来，什么也没说。`,
  (n) => `${n} 提醒你：你已经很久没有喝水了，要不要去喝一口。`,
  (n) => `${n} 说：不用着急，我不会走的。`,
];

// ============================================================
//  localStorage 工具
// ============================================================
const LS = {
  get(k, def) {
    try { return JSON.parse(localStorage.getItem(k)) ?? def; }
    catch { return def; }
  },
  set(k, v) { localStorage.setItem(k, JSON.stringify(v)); },
};

// ============================================================
//  状态
// ============================================================
let tasks     = LS.get('sl_tasks', []);
let eggs      = LS.get('sl_eggs', 0);
let currentPet = LS.get('sl_pet', null);   // { emoji, name }
let collection = LS.get('sl_collection', []); // [{ emoji, name, date }]
let totalEggs  = LS.get('sl_total_eggs', 0);

// 新增状态
let stickyColor = LS.get('sl_color', '#FFF9C4');
// 历史任务记录：{ 'YYYY/M/D': { tasks: [{text,done}], total, done } }
let taskHistory = LS.get('sl_history', {});
// 记录上次打开的日期，用于昨日检测
let lastOpenDate = LS.get('sl_last_date', null);
const todayStr = new Date().toLocaleDateString('zh-CN');

// 配色方案：color=便利贴底色；ink=巧克力色（边框/标题/分割线/正文）；shadow=硬阴影
// panel/panelAlt=内层任务框底色与隔行色（不填则用默认米白）
const COLOR_PALETTE = [
  { color: '#FFF9C4', label: '淡黄', ink: '#5D4037', shadow: '#C8B97A' },
  { color: '#FCE4EC', label: '淡粉', ink: '#5D4037', shadow: '#e8a0b4' },
  { color: '#E3F2FD', label: '淡蓝', ink: '#5D4037', shadow: '#90c8ef' },
  { color: '#E8F5E9', label: '淡绿', ink: '#5D4037', shadow: '#92c99a' },
  { color: '#EDE7F6', label: '浅紫', ink: '#5D4037', shadow: '#b39ddb' },
  // 🍫 薄荷巧克力：薄荷底 + 巧克力边框/文字
  { color: '#A8E6CF', label: '薄荷巧克力', ink: '#5D3A1A', shadow: '#6B3E1B',
    panel: '#E6F7EF', panelAlt: '#D2EFE1', inkSoft: '#9C7A55' },
];

// 自定义鼓励语（每行一句，存数组）
let customEncouragements = LS.get('custom_encouragements', []);

// ============================================================
//  DOM 引用
// ============================================================
const sticky     = document.getElementById('sticky');
const eggCount   = document.getElementById('egg-count');
const hatchBtn   = document.getElementById('hatch-btn');
const petDisplay = document.getElementById('pet-display');
const petName    = document.getElementById('pet-name');
const bubble     = document.getElementById('bubble');
const taskList   = document.getElementById('task-list');
const newInput   = document.getElementById('new-task-input');
const addBtn     = document.getElementById('add-task-btn');
const comfortBtn = document.getElementById('comfort-btn');
const deferBtn   = document.getElementById('defer-btn');
const hatchOverlay = document.getElementById('hatch-overlay');
const hatchAnim  = document.getElementById('hatch-anim');
const hatchMsg   = document.getElementById('hatch-msg');
const collModal  = document.getElementById('collection-modal');
const openCollBtn = document.getElementById('open-coll');
const closeCollBtn = document.getElementById('close-coll');

// 新增 DOM 引用
const openColorBtn   = document.getElementById('open-color');
const colorPickerPop = document.getElementById('color-picker-popup');
const openHistoryBtn = document.getElementById('open-history');
const historyModal   = document.getElementById('history-modal');
const closeHistoryBtn= document.getElementById('close-history');
const historyList    = document.getElementById('history-list');
const yesterdayModal = document.getElementById('yesterday-modal');
const pwaBanner      = document.getElementById('pwa-banner');
const pwaInstallBtn  = document.getElementById('pwa-install-btn');
const pwaDismissBtn  = document.getElementById('pwa-dismiss-btn');

// ============================================================
//  保存函数
// ============================================================
function save() {
  LS.set('sl_tasks', tasks);
  LS.set('sl_eggs', eggs);
  LS.set('sl_pet', currentPet);
  LS.set('sl_collection', collection);
  LS.set('sl_total_eggs', totalEggs);
  // 每次保存时更新今日历史快照
  taskHistory[todayStr] = {
    tasks: tasks.map(t => ({ text: t.text, done: t.done })),
    total: tasks.length,
    done: tasks.filter(t => t.done).length,
  };
  LS.set('sl_history', taskHistory);
}

// ============================================================
//  便利贴颜色自定义
// ============================================================
function applyColor(hex) {
  stickyColor = hex;
  const palette = COLOR_PALETTE.find(c => c.color === hex) || COLOR_PALETTE[0];
  const root = document.documentElement;
  // 切换主题变量：底色 / 巧克力色 / 硬阴影
  root.style.setProperty('--note-bg', palette.color);
  root.style.setProperty('--ink', palette.ink || '#5D4037');
  root.style.setProperty('--ink-soft', palette.inkSoft || palette.shadow || '#c8b97a');
  root.style.setProperty('--shadow', palette.shadow || '#C8B97A');
  root.style.setProperty('--panel', palette.panel || '#FFFDEB');
  root.style.setProperty('--panel-alt', palette.panelAlt || '#F5EDC0');
  sticky.style.background = palette.color;
  // 折角伪元素背景与便利贴同色（边框由 --ink 形成折痕）
  let s = document.getElementById('corner-style');
  if (!s) { s = document.createElement('style'); s.id = 'corner-style'; document.head.appendChild(s); }
  s.textContent = `#sticky::before { background: ${palette.color} !important; }`;
  LS.set('sl_color', hex);
}

function buildColorPicker() {
  colorPickerPop.innerHTML = '';
  COLOR_PALETTE.forEach(p => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (p.color === stickyColor ? ' active' : '');
    dot.style.background = p.color;
    dot.title = p.label;
    dot.addEventListener('click', (e) => {
      e.stopPropagation();
      applyColor(p.color);
      buildColorPicker(); // 刷新高亮
      colorPickerPop.classList.remove('show');
    });
    colorPickerPop.appendChild(dot);
  });
}

openColorBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  buildColorPicker();
  colorPickerPop.classList.toggle('show');
});
// 点击便利贴外部关闭颜色选择器
document.addEventListener('click', () => colorPickerPop.classList.remove('show'));

// ============================================================
//  彩蛋 UI
// ============================================================
function renderEggs() {
  eggCount.textContent = eggs;
  hatchBtn.style.display = eggs >= 1 ? 'inline-block' : 'none';
}

function addEgg(n = 1) {
  eggs += n;
  totalEggs += n;
  save();
  renderEggs();
}

// ============================================================
//  气泡提示
// ============================================================
let bubbleTimer = null;
function showBubble(text, duration = 2500) {
  bubble.textContent = text;
  bubble.style.display = 'block';
  clearTimeout(bubbleTimer);
  bubbleTimer = setTimeout(() => { bubble.style.display = 'none'; }, duration);
}

// ============================================================
//  小动物
// ============================================================
function renderPet() {
  if (currentPet) {
    if (currentPet.img) {
      // 用像素图片；加载失败时回退到 emoji
      petDisplay.innerHTML =
        `<img src="${currentPet.img}" alt="${currentPet.name}" ` +
        `onerror="this.parentNode.textContent='${currentPet.emoji}'">`;
    } else {
      petDisplay.textContent = currentPet.emoji;
    }
    petName.textContent = currentPet.name;
    petDisplay.classList.remove('empty');
    petDisplay.classList.add('pet-float');
  } else {
    petDisplay.innerHTML = '';
    petDisplay.textContent = '？';
    petName.textContent = '空空的';
    petDisplay.classList.add('empty');
    petDisplay.classList.remove('pet-float', 'pet-jump', 'pet-shake');
  }
}

petDisplay.addEventListener('click', () => {
  if (!currentPet) return;
  triggerPetJump(); // 点击触发跳跃
  const msg = PET_TALK[Math.floor(Math.random() * PET_TALK.length)](currentPet.name);
  showBubble(msg);
  // 20% 概率额外送彩蛋
  if (Math.random() < 0.2) {
    addEgg(1);
    setTimeout(() => showBubble(`🥚 ${currentPet.name} 偷偷放了一颗彩蛋！`, 2500), 2600);
  }
});

// ============================================================
//  孵化
// ============================================================
hatchBtn.addEventListener('click', () => {
  if (eggs < 1) return;
  eggs--;
  save();
  renderEggs();

  const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
  // 随机一种裂开蛋壳（蓝/绿）
  const crackedEgg = CRACKED_EGGS[Math.floor(Math.random() * CRACKED_EGGS.length)];
  // 小工具：在孵化框里放图片，加载失败回退到 emoji
  const setHatchImg = (src, fallback) => {
    hatchAnim.innerHTML = `<img src="${src}" alt="" onerror="this.parentNode.textContent='${fallback}'">`;
  };

  // 动画序列: 完整蛋 → 裂开蛋壳 → 动物
  setHatchImg(EGG_IMG.plain, '🥚');
  hatchMsg.textContent = '正在孵化…';
  hatchOverlay.classList.add('show');

  setTimeout(() => { setHatchImg(crackedEgg, '🐣'); hatchMsg.textContent = '蛋壳裂开了！'; }, 700);
  setTimeout(() => {
    setHatchImg(animal.img, animal.emoji);
    hatchMsg.textContent = `${animal.name} 出来啦！`;
  }, 1400);
  setTimeout(() => {
    hatchOverlay.classList.remove('show');
    currentPet = animal;
    // 加入收集册（记录图片路径）
    collection.push({ emoji: animal.emoji, name: animal.name, img: animal.img, date: new Date().toLocaleDateString('zh-CN') });
    save();
    renderPet();
    showBubble(`🎊 欢迎 ${animal.name}！点击它来互动吧~`, 3000);
  }, 2400);
});

// 点击遮罩不关闭（让动画播完）
hatchOverlay.addEventListener('click', () => {});

// ============================================================
//  任务渲染
// ============================================================
function renderTasks() {
  taskList.innerHTML = '';
  tasks.forEach((t, i) => {
    const li = document.createElement('li');
    li.className = 'task-item' + (t.done ? ' done' : '');

    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.checked = t.done;
    cb.addEventListener('change', () => toggleTask(i));

    const span = document.createElement('span');
    span.className = 'task-text';
    span.textContent = t.text;

    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '🗑️';
    del.title = '删除';
    del.addEventListener('click', () => deleteTask(i));

    li.appendChild(cb);
    li.appendChild(span);
    li.appendChild(del);
    taskList.appendChild(li);
  });
}

function addTask() {
  const text = newInput.value.trim();
  if (!text) return;
  tasks.push({ text, done: false });
  newInput.value = '';
  save();
  renderTasks();
}

function toggleTask(i) {
  if (tasks[i].done) {
    // 取消勾选
    tasks[i].done = false;
  } else {
    tasks[i].done = true;
    // 优先使用自定义鼓励语，否则用默认数组
    const pool = customEncouragements.length > 0 ? customEncouragements : ENCOURAGE;
    const msg = pool[Math.floor(Math.random() * pool.length)];
    showBubble(msg);
    addEgg(1);
    triggerPetJump();  // 任务完成时小动物跳跃
    // 通知 Agent 检查"庆祝"规则（延迟以让鼓励气泡先显示）
    if (typeof agent !== 'undefined') {
      setTimeout(() => agent.onTaskCompleted(), 2700);
    }
  }
  save();
  renderTasks();
}

function deleteTask(i) {
  tasks.splice(i, 1);
  save();
  renderTasks();
}

addBtn.addEventListener('click', addTask);
newInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTask(); });

// ============================================================
//  求安慰
// ============================================================
comfortBtn.addEventListener('click', () => {
  const msg = COMFORT[Math.floor(Math.random() * COMFORT.length)];
  showBubble(msg, 3500);
  // 30% 概率赠彩蛋（心软机制）
  if (Math.random() < 0.3) {
    addEgg(1);
    setTimeout(() => showBubble('🥚 悄悄给你一颗彩蛋，因为你值得', 3000), 4000);
  }
});

// ============================================================
//  顺延（保留未完成任务，不删除）
// ============================================================
deferBtn.addEventListener('click', () => {
  const undone = tasks.filter(t => !t.done).length;
  if (undone === 0) {
    showBubble('所有任务都完成啦！你太厉害了 🎉', 2500);
  } else {
    showBubble(`${undone} 件小事顺延到明天，没关系的 🌙`, 3000);
  }
});

// ============================================================
//  收集册（网格版，可切换当前小动物）
// ============================================================
openCollBtn.addEventListener('click', () => {
  document.getElementById('coll-egg-total').textContent = `累计彩蛋：${totalEggs} 🥚`;
  const grid = document.getElementById('coll-grid');
  grid.innerHTML = '';
  if (collection.length === 0) {
    grid.innerHTML = '<div style="padding:12px;font-size:8px;color:#a1887f;grid-column:1/-1">还没有小动物，快去孵化吧</div>';
  } else {
    // 按 emoji+name 去重并统计次数
    const map = {};
    collection.forEach(item => {
      const key = item.emoji + item.name;
      if (!map[key]) map[key] = { ...item, count: 0 };
      map[key].count++;
    });
    Object.values(map).forEach(item => {
      const cell = document.createElement('div');
      const isCurrent = currentPet && currentPet.emoji === item.emoji && currentPet.name === item.name;
      cell.className = 'coll-cell' + (isCurrent ? ' current' : '');
      // 兼容旧数据：没有 img 时按名称/emoji 回查
      const imgSrc = item.img || resolvePetImg(item);
      const visual = imgSrc
        ? `<img class="cell-img" src="${imgSrc}" alt="${item.name}" onerror="this.outerHTML='<span class=\\'cell-emoji\\'>${item.emoji}</span>'">`
        : `<span class="cell-emoji">${item.emoji}</span>`;
      cell.innerHTML = `${visual}
        <span>${item.name}</span>
        <span class="cell-count">×${item.count}</span>`;
      cell.title = isCurrent ? '当前陪伴' : '点击切换陪伴';
      cell.addEventListener('click', () => {
        currentPet = { emoji: item.emoji, name: item.name, img: imgSrc || null };
        save();
        renderPet();
        collModal.classList.remove('show');
        showBubble(`${item.name} 来陪你了。`, 2500);
      });
      grid.appendChild(cell);
    });
  }
  collModal.classList.add('show');
});
closeCollBtn.addEventListener('click', () => collModal.classList.remove('show'));
collModal.addEventListener('click', (e) => { if (e.target === collModal) collModal.classList.remove('show'); });

// ============================================================
//  历史任务
// ============================================================
openHistoryBtn.addEventListener('click', () => {
  historyList.innerHTML = '';
  const dates = Object.keys(taskHistory).sort((a, b) => {
    // 按日期降序
    return new Date(b.replace(/\//g, '-')) - new Date(a.replace(/\//g, '-'));
  });
  if (dates.length === 0) {
    historyList.innerHTML = '<div style="padding:12px;font-size:8px;color:#a1887f">还没有任何历史记录</div>';
  } else {
    dates.forEach(date => {
      const snap = taskHistory[date];
      const dayDiv = document.createElement('div');
      dayDiv.className = 'hist-day';
      const header = document.createElement('div');
      header.className = 'hist-day-header';
      header.innerHTML = `<span>${date}</span><span>${snap.done}/${snap.total} 完成</span>`;
      const tasksDiv = document.createElement('div');
      tasksDiv.className = 'hist-day-tasks';
      (snap.tasks || []).forEach(t => {
        const row = document.createElement('div');
        row.className = 'hist-task-row';
        row.innerHTML = `<span class="${t.done ? 'done-mark' : 'undone-mark'}">${t.done ? '✓' : '○'}</span>
          <span style="color:${t.done ? '#5d4037' : '#bcaaa4'}">${t.text}</span>`;
        tasksDiv.appendChild(row);
      });
      header.addEventListener('click', () => tasksDiv.classList.toggle('open'));
      dayDiv.appendChild(header);
      dayDiv.appendChild(tasksDiv);
      historyList.appendChild(dayDiv);
    });
  }
  historyModal.classList.add('show');
});

// 用 Canvas 生成 PNG 图标，注入动态 manifest（解决 Chrome 要求 PNG 的问题）
function buildPWAManifest() {
  function drawIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.12;

    // 圆角背景
    ctx.fillStyle = '#FFF9C4';
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath(); ctx.fill();

    // 折角
    const cs = size * 0.22;
    ctx.fillStyle = '#e6d97a';
    ctx.beginPath();
    ctx.moveTo(size - cs, 0); ctx.lineTo(size, 0); ctx.lineTo(size, cs);
    ctx.closePath(); ctx.fill();

    // 横线
    ctx.strokeStyle = '#c8b97a';
    ctx.lineWidth = size * 0.022;
    ctx.setLineDash([size * 0.045, size * 0.03]);
    for (let i = 0; i < 3; i++) {
      const y = size * 0.38 + i * size * 0.15;
      ctx.beginPath(); ctx.moveTo(size * 0.16, y); ctx.lineTo(size * 0.72, y); ctx.stroke();
    }

    // 📝 emoji
    ctx.setLineDash([]);
    ctx.font = `${Math.round(size * 0.38)}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('📝', size * 0.5, size * 0.62);

    return c.toDataURL('image/png');
  }

  try {
    const manifest = {
      name: '慢慢贴', short_name: '慢慢贴',
      description: 'ADHD友好型情绪陪伴与任务管理工具',
      start_url: './', display: 'standalone',
      background_color: '#FFF9C4', theme_color: '#FFF9C4',
      orientation: 'portrait-primary',
      icons: [
        { src: drawIcon(192), sizes: '192x192', type: 'image/png', purpose: 'any' },
        { src: drawIcon(512), sizes: '512x512', type: 'image/png', purpose: 'any maskable' },
        { src: 'icon.svg',    sizes: 'any',     type: 'image/svg+xml' },
      ],
    };
    const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
    document.querySelector('link[rel="manifest"]').href = URL.createObjectURL(blob);
  } catch (e) { /* 静默失败，继续使用静态 manifest.json */ }
}

//  拖拽（桌面）
// ============================================================
let isDragging = false;
let dragOffsetX = 0, dragOffsetY = 0;

sticky.addEventListener('mousedown', (e) => {
  // 不在输入框、按钮、复选框上拖拽
  if (['INPUT','BUTTON','TEXTAREA'].includes(e.target.tagName)) return;
  isDragging = true;
  dragOffsetX = e.clientX - sticky.getBoundingClientRect().left;
  dragOffsetY = e.clientY - sticky.getBoundingClientRect().top;
  sticky.classList.add('dragging');
});

document.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  let x = e.clientX - dragOffsetX;
  let y = e.clientY - dragOffsetY;
  x = Math.max(0, Math.min(window.innerWidth  - sticky.offsetWidth,  x));
  y = Math.max(0, Math.min(window.innerHeight - sticky.offsetHeight, y));
  sticky.style.left = x + 'px';
  sticky.style.top  = y + 'px';
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  sticky.classList.remove('dragging');
  LS.set('sl_pos', { x: parseInt(sticky.style.left), y: parseInt(sticky.style.top) });
});

// ============================================================
//  触摸拖拽（手机）—— 简单实现
// ============================================================
let touchOffX = 0, touchOffY = 0;
sticky.addEventListener('touchstart', (e) => {
  if (['INPUT','BUTTON'].includes(e.target.tagName)) return;
  const t = e.touches[0];
  touchOffX = t.clientX - sticky.getBoundingClientRect().left;
  touchOffY = t.clientY - sticky.getBoundingClientRect().top;
}, { passive: true });

sticky.addEventListener('touchmove', (e) => {
  const t = e.touches[0];
  let x = t.clientX - touchOffX;
  let y = t.clientY - touchOffY;
  x = Math.max(0, Math.min(window.innerWidth  - sticky.offsetWidth,  x));
  y = Math.max(0, Math.min(window.innerHeight - sticky.offsetHeight, y));
  sticky.style.left = x + 'px';
  sticky.style.top  = y + 'px';
  e.preventDefault();
}, { passive: false });

sticky.addEventListener('touchend', () => {
  LS.set('sl_pos', { x: parseInt(sticky.style.left), y: parseInt(sticky.style.top) });
});

// ============================================================
//  恢复位置
// ============================================================
function restorePosition() {
  // 手机不做位置恢复
  if (window.innerWidth <= 480) return;
  const pos = LS.get('sl_pos', null);
  if (pos) {
    sticky.style.left = Math.min(pos.x, window.innerWidth  - sticky.offsetWidth)  + 'px';
    sticky.style.top  = Math.min(pos.y, window.innerHeight - sticky.offsetHeight) + 'px';
  } else {
    // 默认居中偏左
    sticky.style.left = Math.max(0, (window.innerWidth  / 2 - 210)) + 'px';
    sticky.style.top  = Math.max(0, (window.innerHeight / 2 - 250)) + 'px';
  }
}

// ============================================================
//  🤖 Agent 行为系统
// ============================================================
// 感知 → 决策 → 行动
// 每 30 秒执行一次 decide()；用户活动时调用 resetTimer()
// 规则按优先级排序，命中即停止；同一规则 30 分钟内不重复触发
const agent = {
  lastActiveTime: Date.now(),
  cooldown: {},                          // {ruleId: 上次触发时间戳}
  COOLDOWN_MS: 30 * 60 * 1000,           // 同一规则冷却 30 分钟
  centerRestoreTimer: null,
  centerOriginalPos: null,
  isAtCenter: false,
  rules: [],                             // 在下方填充
  celebrationRule: null,                 // 事件驱动的庆祝规则

  // ---------- 感知 ----------
  sense() {
    const now = Date.now();
    const idleDuration = now - this.lastActiveTime;
    const doneToday = tasks.filter(t => t.done).length;
    const hour = new Date().getHours();
    let timeOfDay;
    if (hour >= 6 && hour < 12)       timeOfDay = 'morning';
    else if (hour >= 12 && hour < 18) timeOfDay = 'afternoon';
    else                              timeOfDay = 'evening';
    return { now, idleDuration, doneToday, hour, timeOfDay };
  },

  // ---------- 重置最后活动时间 ----------
  resetTimer() {
    this.lastActiveTime = Date.now();
  },

  // ---------- 冷却检查 ----------
  inCooldown(ruleId) {
    const last = this.cooldown[ruleId];
    return last && (Date.now() - last < this.COOLDOWN_MS);
  },
  markFired(ruleId) {
    this.cooldown[ruleId] = Date.now();
  },

  // ---------- 决策 ----------
  decide() {
    const ctx = this.sense();
    for (const rule of this.rules) {
      if (this.inCooldown(rule.id)) continue;
      if (rule.condition(ctx)) {
        rule.action(ctx);
        this.markFired(rule.id);
        break;  // 命中即停止，避免多条规则同时触发
      }
    }
  },

  // ---------- 任务完成事件（脱离 decide 循环） ----------
  onTaskCompleted() {
    const ctx = this.sense();
    const rule = this.celebrationRule;
    if (!rule || this.inCooldown(rule.id)) return;
    if (rule.condition(ctx)) {
      rule.action(ctx);
      this.markFired(rule.id);
    }
  },
};

// ---------- 规则定义（按优先级从高到低） ----------

// 规则1：久坐提醒（≥45 分钟无操作）
agent.rules.push({
  id: 'sit-too-long',
  condition: (ctx) => ctx.idleDuration >= 45 * 60 * 1000,
  action: () => {
    triggerPetShake();
    showBubble('起来走一走，喝杯水 🌿', 5000);
    moveStickyToCenter();
    addEgg(1);
  },
});

// 规则2：晚安提醒（≥30 分钟 且 时间 ≥22 点）
// 注意：放在"温柔拉伸"之前，确保深夜的 30 分钟空闲优先匹配晚安
agent.rules.push({
  id: 'good-night',
  condition: (ctx) => ctx.idleDuration >= 30 * 60 * 1000 && ctx.hour >= 22,
  action: () => {
    showBubble('已经很晚了，该休息啦，明天再做也可以 🌙', 5000);
  },
});

// 规则3：温柔拉伸（30 ≤ idle < 45 分钟）
agent.rules.push({
  id: 'gentle-stretch',
  condition: (ctx) =>
    ctx.idleDuration >= 30 * 60 * 1000 &&
    ctx.idleDuration < 45 * 60 * 1000,
  action: () => {
    showBubble('要不要伸个懒腰？就一分钟。', 4000);
    if (currentPet) {
      petDisplay.classList.remove('pet-jump', 'pet-shake');
      petDisplay.classList.add('pet-float');
    }
  },
});

// 规则4：早安鼓励（早晨 6-12 点 且 至今没有完成任务）
agent.rules.push({
  id: 'morning-encourage',
  condition: (ctx) => ctx.timeOfDay === 'morning' && ctx.doneToday === 0,
  action: () => {
    showBubble('早上好！今天完成一件小事就很棒了 ☀️', 4000);
  },
});

// 规则5：庆祝（事件驱动 — 任务完成后调用，今日完成 ≥3 件）
agent.celebrationRule = {
  id: 'celebrate',
  condition: (ctx) => ctx.doneToday >= 3,
  action: (ctx) => {
    showBubble(`今天已经完成 ${ctx.doneToday} 件事啦！送你一颗彩蛋 🎉`, 3500);
    addEgg(1);
  },
};

// ============================================================
//  便利贴临时移到屏幕中央（5 秒后复位，拖动则中断）
// ============================================================
function moveStickyToCenter() {
  // 已经在中央则不重复移动
  if (agent.isAtCenter) return;

  agent.centerOriginalPos = {
    position:  sticky.style.position,
    left:      sticky.style.left,
    top:       sticky.style.top,
    transform: sticky.style.transform,
  };

  sticky.style.position  = 'fixed';
  sticky.style.left      = '50%';
  sticky.style.top       = '50%';
  sticky.style.transform = 'translate(-50%, -50%)';
  agent.isAtCenter = true;

  agent.centerRestoreTimer = setTimeout(restoreStickyPos, 5000);
}

function restoreStickyPos() {
  if (!agent.isAtCenter) return;
  const orig = agent.centerOriginalPos;
  if (orig) {
    sticky.style.position  = orig.position  || 'absolute';
    sticky.style.left      = orig.left      || '';
    sticky.style.top       = orig.top       || '';
    sticky.style.transform = orig.transform || '';
  }
  agent.isAtCenter = false;
  agent.centerOriginalPos = null;
  if (agent.centerRestoreTimer) {
    clearTimeout(agent.centerRestoreTimer);
    agent.centerRestoreTimer = null;
  }
}

// 用户拖动便利贴 → 中断自动复位（让用户掌控位置）
function cancelCenterRestore() {
  if (!agent.isAtCenter) return;
  if (agent.centerRestoreTimer) {
    clearTimeout(agent.centerRestoreTimer);
    agent.centerRestoreTimer = null;
  }
  agent.isAtCenter = false;
  agent.centerOriginalPos = null;
}
sticky.addEventListener('mousedown',  cancelCenterRestore);
sticky.addEventListener('touchstart', cancelCenterRestore, { passive: true });

// ============================================================
//  监听用户活动 → 重置 Agent 计时器
// ============================================================
['mousemove', 'keydown', 'click'].forEach(evt => {
  document.addEventListener(evt, () => agent.resetTimer(), { passive: true });
});

// 启动决策循环（每 30 秒）
setInterval(() => agent.decide(), 30 * 1000);

  setTimeout(() => agent.decide(), 1000);
}
